<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Head -->
  <circle cx="60" cy="32" r="20" fill="#58CC02"/>
  <!-- Cap -->
  <ellipse cx="60" cy="20" rx="22" ry="8" fill="#46A302"/>
  <rect x="38" y="16" rx="4" width="44" height="6" fill="#46A302"/>
  <!-- Eyes -->
  <circle cx="52" cy="30" r="3" fill="white"/>
  <circle cx="68" cy="30" r="3" fill="white"/>
  <circle cx="52" cy="30" r="1.5" fill="#131F24"/>
  <circle cx="68" cy="30" r="1.5" fill="#131F24"/>
  <!-- Focused mouth -->
  <path d="M52 38 L68 38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Jersey area -->
  <rect x="35" y="52" rx="12" ry="12" width="50" height="42" fill="#58CC02"/>
  <!-- Gloves -->
  <rect x="18" y="76" rx="6" ry="6" width="20" height="14" fill="#FFD700"/>
  <rect x="82" y="76" rx="6" ry="6" width="20" height="14" fill="#FFD700"/>
  <!-- Arms -->
  <rect x="22" y="56" rx="8" ry="8" width="16" height="28" fill="#58CC02"/>
  <rect x="82" y="56" rx="8" ry="8" width="16" height="28" fill="#58CC02"/>
  <!-- Shorts -->
  <rect x="38" y="90" rx="6" ry="6" width="20" height="18" fill="#131F24"/>
  <rect x="62" y="90" rx="6" ry="6" width="20" height="18" fill="#131F24"/>
  <!-- Number -->
  <text x="60" y="80" text-anchor="middle" font-family="Arial Black" font-size="18" font-weight="900" fill="white">1</text>
</svg>
