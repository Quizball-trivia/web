<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Glow -->
  <circle cx="60" cy="60" r="55" fill="#CE82FF" opacity="0.1"/>
  <!-- Head -->
  <circle cx="60" cy="32" r="20" fill="#CE82FF"/>
  <!-- Crown -->
  <polygon points="44,18 48,8 54,16 60,6 66,16 72,8 76,18" fill="#FFD700"/>
  <!-- Eyes (star-shaped confidence) -->
  <circle cx="52" cy="30" r="3.5" fill="white"/>
  <circle cx="68" cy="30" r="3.5" fill="white"/>
  <circle cx="52" cy="30" r="1.5" fill="#131F24"/>
  <circle cx="68" cy="30" r="1.5" fill="#131F24"/>
  <!-- Smirk -->
  <path d="M52 38 Q60 44 70 37" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Jersey area -->
  <rect x="35" y="52" rx="12" ry="12" width="50" height="42" fill="#CE82FF"/>
  <!-- Star on chest -->
  <polygon points="60,60 62,66 68,66 63,70 65,76 60,72 55,76 57,70 52,66 58,66" fill="#FFD700"/>
  <!-- Arms -->
  <rect x="22" y="56" rx="8" ry="8" width="16" height="28" fill="#CE82FF"/>
  <rect x="82" y="56" rx="8" ry="8" width="16" height="28" fill="#CE82FF"/>
  <!-- Shorts -->
  <rect x="38" y="90" rx="6" ry="6" width="20" height="18" fill="#131F24"/>
  <rect x="62" y="90" rx="6" ry="6" width="20" height="18" fill="#131F24"/>
  <!-- Number -->
  <text x="60" y="80" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="white">10</text>
</svg>
